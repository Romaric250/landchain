services:
  backend:
    build: .
    ports:
      - "8095:8095"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/landchain
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
  worker:
    build: .
    command: python -m app.workers.subscription_check
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/landchain
    depends_on:
      - mongo
    restart: unless-stopped
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    restart: unless-stopped
volumes:
  mongo_data: